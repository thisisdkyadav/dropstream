name = "p2pfile"
main = "src/worker.js"
compatibility_date = "2026-06-08"

[assets]
directory = "./public"
binding = "ASSETS"

# Optional: use a private Metered TURN project for reliable relaying across
# strict/symmetric NATs. Uncomment and set your "<app>.metered.live" subdomain,
# then add the key as a secret:  npx wrangler secret put METERED_API_KEY
# Without these, the Worker falls back to public STUN + Metered Open Relay.
# [vars]
# METERED_APP = "your-metered-app"

[[durable_objects.bindings]]
name = "ROOMS"
class_name = "Room"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Room"]
