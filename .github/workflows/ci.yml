name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check JavaScript syntax
        run: |
          node --check src/worker.js
          for f in public/*.js; do
            echo "checking $f"
            node --check "$f"
          done
